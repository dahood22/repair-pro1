<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>
</head>
<body>

<h2>إضافة جهاز</h2>

<input id="name" placeholder="اسم الزبون"><br>
<input id="phone" placeholder="رقم الهاتف"><br>
<input id="device" placeholder="نوع الجهاز"><br>
<input id="issue" placeholder="العطل"><br>

<button onclick="add()">إضافة</button>

<h2>تحديث حالة</h2>
<input id="tid" placeholder="رقم التتبع">
<input id="status" placeholder="الحالة">
<input id="price" placeholder="السعر">

<button onclick="update()">تحديث</button>

<script>
const password = "123456";

async function add() {
  const res = await fetch("/api/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "password": password
    },
    body: JSON.stringify({
      customerName: name.value,
      phone: phone.value,
      device: device.value,
      issue: issue.value
    })
  });

  const data = await res.json();
  alert("رابط الزبون:\n" + data.link);
}

async function update() {
  await fetch(`/api/update/${tid.value}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "password": password
    },
    body: JSON.stringify({
      status: status.value,
      price: price.value
    })
  });

  alert("تم التحديث");
}
</script>

</body>
</html>
