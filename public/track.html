<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>تتبع جهازك</title>
<style>
body { font-family: Arial; text-align: center; }
.box { margin-top: 50px; }
.status { font-size: 22px; color: green; }
</style>
</head>
<body>

<h2>📱 تتبع حالة جهازك</h2>

<div class="box">
  <input id="id" placeholder="ادخل رقم التتبع">
  <button onclick="track()">بحث</button>
</div>

<div id="result"></div>

<script>
async function track() {
  const id = document.getElementById("id").value;
  const res = await fetch(`/api/track/${id}`);
  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <p>📱 ${data.device}</p>
    <p>🔧 ${data.issue}</p>
    <p class="status">📊 ${data.status}</p>
    <p>💰 ${data.price || "-"} شيكل</p>
  `;
}
</script>

</body>
</html>
